<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Estação Climática</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet" />
</head>

<body>
    <header class="app-header">
        <div class="header-inner">
            <div class="header-brand">
                <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                    <circle cx="12" cy="12" r="4"/>
                </svg>
                <h1>Estação Climática</h1>
            </div>
            <div class="header-time" id="headerTime"></div>
        </div>
    </header>

    <div class="app-body">
        <nav class="tab-nav" role="tablist" aria-label="Ambientes monitorados">
            <button class="tablink active" type="button" role="tab" aria-selected="true" aria-controls="Tab1" data-tab-target="Tab1">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Sala
            </button>
            <button class="tablink" type="button" role="tab" aria-selected="false" aria-controls="Tab2" data-tab-target="Tab2">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Quarto
            </button>
            <button class="tablink" type="button" role="tab" aria-selected="false" aria-controls="Tab3" data-tab-target="Tab3">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Aquário
            </button>
        </nav>

        <div class="loading-bar" id="loadingBar"></div>

        <main class="container">
            <!-- Sala -->
            <div class="tabcontent" id="Tab1" role="tabpanel">
                <div class="charts-grid" id="chart-container-temp-sala">
                    <div class="chart-card">
                        <span class="chart-label">Temperatura</span>
                        <canvas aria-label="Temperatura da sala" class="plot" id="plotsTempSala" role="img"></canvas>
                    </div>
                    <div class="chart-card">
                        <span class="chart-label">Sensação Térmica</span>
                        <canvas aria-label="Sensação térmica da sala" class="plot" id="plotsSTSala" role="img"></canvas>
                    </div>
                    <div class="chart-card">
                        <span class="chart-label">Umidade</span>
                        <canvas aria-label="Umidade da sala" class="plot" id="plotsUmidadeSala" role="img"></canvas>
                    </div>
                    <div class="chart-card">
                        <span class="chart-label">Pressão</span>
                        <canvas aria-label="Pressão da sala" class="plot" id="plotsPressaoSala" role="img"></canvas>
                    </div>
                </div>
                <div class="table-wrapper" id="dataSala"></div>
            </div>

            <!-- Quarto -->
            <div class="tabcontent" id="Tab2" role="tabpanel">
                <div class="charts-grid" id="chart-container-temp-quarto">
                    <div class="chart-card">
                        <span class="chart-label">Temperatura</span>
                        <canvas aria-label="Temperatura do quarto" class="plot" id="plotsTemp" role="img"></canvas>
                    </div>
                    <div class="chart-card">
                        <span class="chart-label">Sensação Térmica</span>
                        <canvas aria-label="Sensação térmica do quarto" class="plot" id="plotsST" role="img"></canvas>
                    </div>
                    <div class="chart-card">
                        <span class="chart-label">Umidade</span>
                        <canvas aria-label="Umidade do quarto" class="plot" id="plotsUmidade" role="img"></canvas>
                    </div>
                </div>
                <div class="chart-card chart-card--wide" id="chart-container-sun">
                    <span class="chart-label">Nascer &amp; Pôr do Sol</span>
                    <canvas aria-label="Nascer e pôr do sol" class="plot" id="plotSunriseSunset" role="img"></canvas>
                </div>
                <div class="chart-card chart-card--wide" id="chart-container-sun-today">
                    <span class="chart-label">Ciclo Solar de Hoje</span>
                    <canvas aria-label="Ciclo solar de hoje" class="plot plot--solar-day" id="plotSolarToday" role="img"></canvas>
                </div>
                <div class="table-wrapper" id="data"></div>
            </div>

            <!-- Aquário -->
            <div class="tabcontent" id="Tab3" role="tabpanel">
                <div class="charts-grid" id="chart-container-temp-aquario">
                    <div class="chart-card">
                        <span class="chart-label">Temperatura</span>
                        <canvas aria-label="Temperatura do aquário" class="plot" id="plotsTempAquario" role="img"></canvas>
                    </div>
                    <div class="chart-card">
                        <span class="chart-label">PH</span>
                        <canvas aria-label="PH do aquário" class="plot" id="plotsPH" role="img"></canvas>
                    </div>
                    <div class="chart-card">
                        <span class="chart-label">TDS</span>
                        <canvas aria-label="TDS do aquário" class="plot" id="plotsTDS" role="img"></canvas>
                    </div>
                    <div class="chart-card">
                        <span class="chart-label">Turbidez</span>
                        <canvas aria-label="Turbidez do aquário" class="plot" id="plotsTurbidez" role="img"></canvas>
                    </div>
                </div>
                <div class="table-wrapper" id="dataAquario"></div>
            </div>
        </main>
    </div>

    <script>
        function updateClock() {
            const el = document.getElementById('headerTime');
            if (!el) return;
            const now = new Date();
            el.textContent = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <script src="main.js?v=20260528-2"></script>
</body>

</html>
